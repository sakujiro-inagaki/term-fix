[general]
name = "term"
version = "0.2.0"
fix_version = "1.3.0"
license = "MIT"

[build]
files = [
    "src/Yaynu/Term.fix",
    "src/Yaynu/Term/Ansi.fix",
    "src/Yaynu/Term/Ffi.fix",
    "src/Yaynu/Term/Input.fix",
    "src/Yaynu/Term/Key.fix",
    "src/Yaynu/Term/Mode.fix",
    "src/Yaynu/Term/Output.fix",
    "src/Yaynu/Term/Size.fix",
]

# C shim static library — produced by scripts/build_shim.sh during preliminary_commands.
static_links = ["term_shim"]
library_paths = ["c_src"]

preliminary_commands = [["sh", "scripts/build_shim.sh"]]

[build.test]
files = ["tests/TermTest.fix"]
